server:
  port: 8080

spring:
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
      # naming:
      #   physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

jwt:
  access:
    key: ${JWT_ACCESS_SECRET_KEY}
    expireMins: ${JWT_ACCESS_EXPIRES_MINS}      
  refresh:
    key: ${JWT_REFRESH_SECRET_KEY}
    expireDays: ${JWT_REFRESH_EXPIRES_DAYS}
  reset:
    key: ${JWT_RESET_PASSWORD_SECRET_KEY}
    expireMins: ${JWT_RESET_PASSWORD_EXPIRES_MINS}    

send-mail-service:
  url: ${SEND_RESET_PASS_MAIL_API_URL}

frontend:
  url: ${FRONTEND_URL}


logging:
  level:
    root: INFO
    com.nchuy099.mini_instagram: DEBUG
    # org.hibernate.SQL: DEBUG
    # org.hibernate.orm.jdbc.bind: TRACE