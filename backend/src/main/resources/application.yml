server:
  port: 8080

spring:
  datasource:
    url: ${PG_URL}
    username: ${PG_USERNAME}
    password: ${PG_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          facebook:
            client-id: ${FACEBOOK_APP_ID}
            client-secret: ${FACEBOOK_APP_SECRET}
            scope:
              - email
              - public_profile

logging:
  level:
    root: INFO
    com.nchuy099.mini_instagram: DEBUG

aws:
  access-key: ${AWS_ACCESS_KEY_ID}
  secret-key: ${AWS_SECRET_ACCESS_KEY}
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket: ${AWS_S3_BUCKET}
    # org.hibernate.SQL: DEBUG
    # org.hibernate.orm.jdbc.bind: TRACE

frontend_url: ${FRONTEND_URL:http://localhost:5173}

app:
  user:
    default-avatar-url: ${DEFAULT_AVATAR_URL:https://www.shutterstock.com/image-vector/default-avatar-profile-icon-social-600nw-2409187029.jpg}
